[package]
name = "fugue"
version = "0.1.0"
edition = "2021"

[dependencies]
cpal = "0.15"
rand = "0.8"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["AudioContext", "AudioDestinationNode"] }

[[example]]
name = "dorian_melody"
path = "examples/dorian_melody.rs"

[[example]]
name = "modular_clock"
path = "examples/modular_clock.rs"

[[example]]
name = "modular_chain"
path = "examples/modular_chain.rs"

[[example]]
name = "modular_voice"
path = "examples/modular_voice.rs"
