[package]
name = "fugue"
version = "0.1.0"
edition = "2021"

[dependencies]
cpal = "0.15"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
indexmap = "2.0"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["AudioContext", "AudioDestinationNode"] }

[[example]]
name = "simple_tone"
path = "examples/simple_tone.rs"

[[example]]
name = "modular_adsr_melody"
path = "examples/modular_adsr_melody.rs"
