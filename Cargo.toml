[package]
name = "fugue"
version = "0.1.0"
edition = "2021"

[dependencies]
cpal = "0.15"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["AudioContext", "AudioDestinationNode"] }

[[example]]
name = "dorian_melody"
path = "examples/dorian_melody.rs"

[[example]]
name = "dorian_melody_declarative"
path = "examples/dorian_melody_declarative.rs"

[[example]]
name = "fm_synthesis_demo"
path = "examples/fm_synthesis_demo.rs"

[[example]]
name = "am_synthesis_demo"
path = "examples/am_synthesis_demo.rs"
