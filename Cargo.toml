[package]
name = "fugue"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["rlib", "staticlib", "cdylib"]

[dependencies]
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
indexmap = "2.0"
hound = "3.5"
rmcp = { version = "1.1", features = ["server", "transport-io"], optional = true }
tokio = { version = "1", features = ["full"], optional = true }
schemars = { version = "1", optional = true }
tracing-subscriber = { version = "0.3", optional = true }
rustyline = { version = "14", optional = true }
notify = { version = "7", optional = true }
notify-debouncer-mini = { version = "0.5", optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
cpal = "0.15"
ureq = { version = "2.10", default-features = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }
wasm-bindgen = "0.2"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["AudioContext", "AudioDestinationNode"] }

[features]
ffi = []
mcp = ["dep:rmcp", "dep:tokio", "dep:schemars", "dep:tracing-subscriber"]
repl = ["dep:rustyline"]
dev = ["dep:notify", "dep:notify-debouncer-mini", "dep:tokio", "dep:tracing-subscriber"]

[[bin]]
name = "fugue-mcp"
path = "src/bin/fugue-mcp.rs"
required-features = ["mcp"]

[[bin]]
name = "fugue"
path = "src/bin/fugue-repl.rs"
required-features = ["repl"]

[[bin]]
name = "fugue-mcp-dev"
path = "src/bin/fugue-mcp-dev.rs"
required-features = ["dev"]

[[example]]
name = "simple_tone"
path = "examples/simple_tone.rs"

[[example]]
name = "modular_adsr_melody"
path = "examples/modular_adsr_melody.rs"
