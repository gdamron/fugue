name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        type: string
      ref:
        description: Git ref to build from
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: false
  CARGO_NET_RETRY: 10
  RELEASE_REF: ${{ inputs.ref || github.ref }}

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Validate Cargo version
        run: |
          set -euo pipefail
          actual_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [[ "$actual_version" != "${{ inputs.version }}" ]]; then
            echo "Cargo.toml version $actual_version does not match workflow input ${{ inputs.version }}" >&2
            exit 1
          fi

  native:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Install Linux Audio Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --features ffi --target ${{ matrix.target }}
      - name: Package
        run: bash scripts/package-native.sh ${{ matrix.target }} ${{ inputs.version }} dist
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: dist/*.tar.gz

  ios:
    needs: validate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Install Rust targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
      - name: Build device and simulator archives
        run: |
          cargo build --release --features ffi --target aarch64-apple-ios
          cargo build --release --features ffi --target aarch64-apple-ios-sim
          cargo build --release --features ffi --target x86_64-apple-ios
      - name: Package xcframework
        run: bash scripts/package-ios.sh ${{ inputs.version }} dist
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: dist/*.tar.gz

  android:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
      - name: Install Rust targets
        run: rustup target add aarch64-linux-android x86_64-linux-android
      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: Build Android shared libraries
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a -t x86_64 build --release --features ffi
      - name: Package Android artifacts
        run: bash scripts/package-android.sh ${{ inputs.version }} dist
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*.tar.gz

  wasm:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Install Rust target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-bindgen CLI
        run: |
          set -euo pipefail
          # The CLI must match the `wasm-bindgen` crate version the wasm module
          # was built against, or `wasm-bindgen` errors on a schema mismatch.
          # Pin it to the version resolved in Cargo.lock.
          version="$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | sed -n 's/^version = "\(.*\)"/\1/p' | head -n1)"
          echo "Installing wasm-bindgen-cli $version (from Cargo.lock)"
          cargo install wasm-bindgen-cli --version "$version" --locked
      - name: Build wasm module
        run: cargo build --release --target wasm32-unknown-unknown
      - name: Generate web package
        run: |
          mkdir -p dist/wasm
          wasm-bindgen target/wasm32-unknown-unknown/release/fugue.wasm \
            --out-dir dist/wasm \
            --target web
      - name: Package wasm artifacts
        run: bash scripts/package-wasm.sh ${{ inputs.version }} dist dist/wasm
      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: dist/*.tar.gz

  client-binaries:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
      - name: Download client binaries from private releases
        env:
          GH_TOKEN: ${{ secrets.CLIENT_BINARIES_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p download
          # The `fugue` and `fugue-mcp` binaries are built (and macOS-signed +
          # notarized) in their own (private) repos. Pull the prebuilt, signed
          # assets for this version with a read-only PAT. The private releases
          # for v$VERSION must already exist (release fugue-cli and fugue-mcp
          # first).
          gh release download "v$VERSION" -R gdamron/fugue-cli --pattern 'fugue-cli-*.tar.gz' --dir download
          gh release download "v$VERSION" -R gdamron/fugue-mcp --pattern 'fugue-mcp-*.tar.gz' --dir download
      - name: Assemble combined install unit
        run: |
          set -euo pipefail
          mkdir -p dist
          # Repackage the same-target CLI + MCP archives into one signed install
          # unit (fugue-tools-<target>.tar.gz) — the artifact the installer, brew
          # formula, and .mcpb all consume (FUG-227).
          bash scripts/package-tools.sh download dist
          # Keep re-hosting the individual per-repo archives alongside the combined
          # unit for downstream/back-compat consumers.
          cp download/*.tar.gz dist/
      - uses: actions/upload-artifact@v4
        with:
          name: client-binaries
          path: dist/*.tar.gz

  release:
    needs:
      - native
      - ios
      - android
      - wasm
      - client-binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create tag if needed
        env:
          TAG: v${{ inputs.version }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG" "$(git rev-parse HEAD)"
            git push origin "$TAG"
          fi
      - name: Generate checksums
        run: |
          set -euo pipefail
          find dist -type f -name '*.tar.gz' -print0 | sort -z | while IFS= read -r -d '' file; do
            sha256sum "$file"
          done > dist/SHA256SUMS.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          target_commitish: ${{ env.RELEASE_REF }}
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
